global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "atlas-gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8200"]

  - job_name: "atlas-catalog"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8201"]

  - job_name: "atlas-search"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8202"]

  - job_name: "atlas-order"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["host.docker.internal:8203"]