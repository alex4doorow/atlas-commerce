server:
  port: ${ATLAS_ORDER_PORT}

spring:
  application:
    name: atlas-order

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOACK_REALM_ATLAS_HOST}

  datasource:
    url: ${ATLAS_ORDER_DATABASE_URL}
    username: ${ATLAS_ORDER_DATABASE_USER}
    password: ${ATLAS_ORDER_DATABASE_PASS}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${ATLAS_KAFKA_URL}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  jackson:
    default-property-inclusion: non_null

  profiles:
    active: prod

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans

clients:
  catalog:
    url: ${ATLAS_CATALOG_URL}

logging:
  level:
    root: INFO
    com.afa.atlas.commerce.order: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE


