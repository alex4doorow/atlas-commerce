{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-catalog
spec:
  ingressClassName: nginx
  rules:
    - host: atlas-catalog.local
      http:
        paths:
          - path: /api/v1/products
            pathType: Prefix
            backend:
              service:
                name: atlas-catalog
                port:
                  number: 8201
{{- end }}