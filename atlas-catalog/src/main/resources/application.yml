server:
  port: ${ATLAS_CATALOG_PORT}

spring:
  application:
    name: atlas-catalog

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ATLAS_KEYCLOACK_REALM_HOST}

  datasource:
    url: ${ATLAS_CATALOG_DATABASE_URL}
    username: ${ATLAS_CATALOG_DATABASE_USER}
    password: ${ATLAS_CATALOG_DATABASE_PASS}
    hikari:
      pool-name: AtlasCatalogHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: redis

  data:
    redis:
      host: ${ATLAS_REDIS_HOST}
      port: ${ATLAS_REDIS_PORT}

  mongodb:
    uri: ${ATLAS_MONGODB_HOST}

  jackson:
    default-property-inclusion: non_null

  rabbitmq:
    host: ${ATLAS_RABBITMQ_HOST}
    port: ${ATLAS_RABBITMQ_PORT}
    username: ${ATLAS_RABBITMQ_USER}
    password: ${ATLAS_RABBITMQ_PASS}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  profiles:
    active: prod

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.afa.atlas.commerce.catalog: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

atlas:
  cache:
    ttl:
      hours: ${CACHE_TTL_HOURS:6}

  s3:
    endpoint: ${S3_HOST}
    region: us-east-1
    access-key: ${S3_USER}
    secret-key: ${S3_PASSWORD}
    bucket: atlas-products
    public-url: ${S3_BUCKET_URL}
