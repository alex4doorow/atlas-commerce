server:
  port: ${ATLAS_CATALOG_PORT}

spring:
  application:
    name: atlas-catalog

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOACK_REALM_ATLAS_HOST}

  datasource:
    url: ${ATLAS_CATALOG_DATABASE_URL}
    username: ${ATLAS_CATALOG_DATABASE_USER}
    password: ${ATLAS_CATALOG_DATABASE_PASS}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: redis

  data:
    redis:
      host: ${ATLAS_REDIS_HOST}
      port: ${ATLAS_REDIS_PORT}
    mongodb:
      uri: ${ATLAS_MONGODB_HOST}

  jackson:
    default-property-inclusion: non_null

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  profiles:
    active: prod

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,caches
  health:
    redis:
      enabled: true

logging:
  level:
    root: INFO
    com.afa.atlas.commerce.catalog: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

atlas:
  cache:
    ttl:
      hours: ${CACHE_TTL_HOURS:6}

  s3:
    endpoint: ${S3_HOST}
    region: us-east-1
    access-key: ${S3_USER}
    secret-key: ${S3_PASSWORD}
    bucket: atlas-products
    public-url: ${S3_BUCKET_URL}
