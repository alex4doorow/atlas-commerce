server:
  port: 0

spring:
  application:
    name: atlas-catalog-test

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/atlas

  cache:
    type: simple

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  rabbitmq:
    host: localhost
    port: 5672
    username: atlas
    password: atlas
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

atlas:
  cache:
    ttl:
      hours: 1
  s3:
    endpoint: http://localhost:9100
    region: us-east-1
    access-key: minioadmin
    secret-key: minioadmin
    bucket: atlas-products
    public-url: http://localhost:9100/atlas-products