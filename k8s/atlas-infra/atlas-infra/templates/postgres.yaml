apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-postgres-init
data:
  init.sql: |
    CREATE DATABASE "afa-atlas-commerce-catalog-test";
    CREATE DATABASE "afa-atlas-commerce-order-test";
    CREATE DATABASE "afa-atlas-commerce-analytics-test";
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: atlas-postgres

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlas-postgres
  template:
    metadata:
      labels:
        app: atlas-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          volumeMounts:
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-init
          configMap:
            name: atlas-postgres-init