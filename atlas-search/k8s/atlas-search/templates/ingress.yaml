{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-search
spec:
  ingressClassName: nginx
  rules:
    - host: atlas-search.local
      http:
        paths:
          - path: /api/v1/search/products
            pathType: Prefix
            backend:
              service:
                name: atlas-search
                port:
                  number: 8202
{{- end }}