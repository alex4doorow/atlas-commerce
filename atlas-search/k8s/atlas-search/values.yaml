image:
  repository: atlas-search
  tag: "1.0"

replicaCount: 1

service:
  type: ClusterIP
  port: 8202

rabbitmq:
  host: "atlas-rabbitmq"
  port: 5672
  user: "atlas"
  password: "atlas"

elastic:
  url: "http://atlas-elasticsearch:9200"

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "1000m"

ingress:
  enabled: true