server:
  port: ${ATLAS_ANALYTICS_PORT}

spring:
  application:
    name: atlas-analytics

  datasource:
    url: ${ATLAS_ANALYTICS_DATABASE_URL}
    username: ${ATLAS_ANALYTICS_DATABASE_USER}
    password: ${ATLAS_ANALYTICS_DATABASE_PASS}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${ATLAS_KAFKA_URL}
    consumer:
      group-id: atlas-analytics
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.afa.atlas.commerce.*
        spring.json.value.default.type: com.afa.atlas.commerce.common.events.OrderCreatedEvent
