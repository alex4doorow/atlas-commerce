server:
  port: ${ATLAS_ANALYTICS_PORT}

spring:
  application:
    name: atlas-analytics

  datasource:
    url: ${ATLAS_ANALYTICS_DATABASE_URL}
    username: ${ATLAS_ANALYTICS_DATABASE_USER}
    password: ${ATLAS_ANALYTICS_DATABASE_PASS}
    hikari:
      pool-name: AtlasAnalyticsHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${ATLAS_KAFKA_URL}

management:
  tracing:
    sampling:
      probability: 1.0

  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${ATLAS_OPENTELEMETRY_OTLP_URL}

    metrics:
      export:
        otlp:
          endpoint: ${ATLAS_METRICS_OTLP_URL}

  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
