{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-analytics
spec:
  ingressClassName: nginx
  rules:
    - host: atlas-analytics.local
      http:
        paths:
          - path: /api/v1/analytics
            pathType: Prefix
            backend:
              service:
                name: atlas-analytics
                port:
                  number: {{ .Values.service.port }}
{{- end }}